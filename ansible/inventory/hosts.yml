---
# One inventory spanning both clusters, two clouds. Each "host" is a
# Kubernetes API target selected by kubeconfig context; execution is local
# (API-driven deployment, not SSH config management).
#
# Refresh kubeconfig contexts when clusters are recreated:
#   gcloud container clusters get-credentials mc-dr-gke \
#     --zone us-central1-a --project mc-dr-orchestrator
#   az aks get-credentials --name mc-dr-aks \
#     --resource-group mc-dr-standby-rg --overwrite-existing
#
# Verify with: kubectl config get-contexts
clusters:
  hosts:
    gke-primary:
      kube_context: gke_mc-dr-orchestrator_us-central1-a_mc-dr-gke
      cloud: gcp
      postgres_role: primary
      storage_class: standard-rwo # GCP Persistent Disk standard, $0.04/GB/month
    aks-standby:
      kube_context: mc-dr-aks
      cloud: azure
      postgres_role: standby
      storage_class: managed-csi # Azure Managed Disk standard, ~$0.044/GB/month
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

###############################################################################
# GitHub Actions — Multi-Cloud DR Orchestrator CI/CD
#
# Triggers:
#   push to main  → full plan + apply on both AWS and Azure
#   pull_request  → plan only (no apply)
#   manual        → workflow_dispatch with selectable target
#
# Required secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   TF_VAR_db_master_password
#   TF_VAR_alert_email
#   TF_VAR_route53_zone_id
#   TF_VAR_domain_name
#   SLACK_WEBHOOK_URL (optional)
###############################################################################

name: DR Orchestrator CI/CD

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "scripts/**"
      - "k8s/**"
      - ".github/workflows/deploy.yml"

  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "scripts/**"

  workflow_dispatch:
    inputs:
      target:
        description: "Terraform target (leave blank for full apply)"
        required: false
        default: ""
      destroy:
        description: "Set to 'true' to destroy infrastructure (DANGEROUS)"
        required: false
        default: "false"

env:
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.12"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_db_master_password: ${{ secrets.TF_VAR_db_master_password }}
  TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email }}
  TF_VAR_route53_zone_id: ${{ secrets.TF_VAR_route53_zone_id }}
  TF_VAR_domain_name: ${{ secrets.TF_VAR_domain_name }}
  TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  # ── Lint + Static Analysis ─────────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt flake8 bandit

      - name: Python lint (flake8)
        run: flake8 scripts/ --max-line-length=120 --ignore=E501,W503

      - name: Python security scan (bandit)
        run: bandit -r scripts/ -ll

      - name: Validate Kubernetes manifests
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          ./kubectl apply --dry-run=client -f k8s/aws/ 2>/dev/null || true
          ./kubectl apply --dry-run=client -f k8s/azure/ 2>/dev/null || true

  # ── Terraform Plan ─────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          TARGET_FLAG=""
          if [ -n "${{ github.event.inputs.target }}" ]; then
            TARGET_FLAG="-target=${{ github.event.inputs.target }}"
          fi
          terraform plan -input=false -out=tfplan $TARGET_FLAG 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 7

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const maxLength = 65000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... [truncated]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Terraform Apply ────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # Requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        working-directory: terraform
        run: |
          if [ "${{ github.event.inputs.destroy }}" == "true" ]; then
            echo "⚠️  DESTROY mode enabled — requires second human approval"
            terraform destroy -auto-approve -input=false
          else
            terraform apply -input=false tfplan
          fi

      - name: Save Terraform outputs
        working-directory: terraform
        run: terraform output -json > ../tf_outputs.json

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: tf_outputs.json
          retention-days: 30

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"✅ DR Orchestrator deployed successfully from commit \`${{ github.sha }}\`\"}"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ DR Orchestrator deploy FAILED on commit \`${{ github.sha }}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"}"

  # ── DR Smoke Test ──────────────────────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run smoke tests
        run: |
          python scripts/health_monitor.py \
            --primary-url "https://api.${{ secrets.TF_VAR_domain_name }}/healthz" \
            --check-interval 10 \
            --failure-threshold 1 &
          MONITOR_PID=$!
          sleep 30
          kill $MONITOR_PID || true
          echo "Smoke test complete"

      - name: Verify failback readiness
        run: |
          python scripts/failback.py --verify-only 2>&1 || echo "Failback pre-check done (may fail until primary is seeded)"

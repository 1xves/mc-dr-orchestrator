name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest pytest-mock
          # Install project deps (exclude heavy cloud SDKs for CI speed)
          pip install requests python-dotenv

      - name: Lint with ruff
        run: ruff check scripts/

      - name: Check for AWS SDK imports (must be zero)
        run: |
          echo "Scanning for boto3/botocore imports..."
          if grep -r "import boto3\|from boto3\|import botocore\|from botocore" scripts/; then
            echo "ERROR: AWS SDK imports found — this project uses GCP + Azure only"
            exit 1
          fi
          echo "Clean — no AWS SDK imports detected"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          echo "Checking for sensitive files..."
          FOUND=0

          # tfvars should never be committed (contains db_master_password)
          if find . -name "*.tfvars" -not -name "*.example" | grep -q .; then
            echo "ERROR: .tfvars file found (not .example) — contains secrets"
            FOUND=1
          fi

          # Terraform state files contain resource metadata + potentially secrets
          if find . -name "*.tfstate*" | grep -q .; then
            echo "ERROR: .tfstate file found — must not be committed"
            FOUND=1
          fi

          # .env files
          if find . -name ".env" -not -name ".env.example" | grep -q .; then
            echo "ERROR: .env file found"
            FOUND=1
          fi

          # GCP service account key files
          if find . -name "*-key.json" -o -name "*credentials*.json" | grep -q .; then
            echo "ERROR: Potential GCP credential file found"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            exit 1
          fi

          echo "Secret scan clean"

  ansible:
    name: Ansible Lint + Manifest Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible toolchain
        run: |
          pip install --upgrade pip
          pip install "ansible-core>=2.16" ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Playbook syntax check
        working-directory: ansible
        run: ansible-playbook --syntax-check deploy_postgres.yml render_manifests.yml

      - name: Ansible lint
        run: ansible-lint ansible/

      - name: Render manifests for every inventory host
        working-directory: ansible
        run: ansible-playbook render_manifests.yml

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate rendered manifests (both clusters)
        run: |
          find ansible/build/rendered -name '*.yaml' -print
          find ansible/build/rendered -name '*.yaml' -exec kubeval --ignore-missing-schemas {} +

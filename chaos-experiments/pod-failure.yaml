###############################################################################
# Chaos Mesh — Pod Failure Experiments
# Tests application resilience independently of network/DR failover.
###############################################################################

# ── Random pod kill (tests k8s self-healing) ──────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: random-pod-kill
  namespace: chaos-testing
spec:
  action: pod-kill
  mode: one           # Kill one random pod at a time
  selector:
    namespaces:
      - app
    labelSelectors:
      tier: api
  duration: "5m"
  scheduler:
    cron: "0 3 * * 3"  # Every Wednesday at 03:00 UTC

---
# ── Container CPU stress (tests autoscaling) ──────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress-test
  namespace: chaos-testing
spec:
  mode: all
  selector:
    namespaces:
      - app
    labelSelectors:
      tier: api
  stressors:
    cpu:
      workers: 4
      load: 80    # 80% CPU load
  duration: "3m"

---
# ── DNS failure (tests service discovery resilience) ──────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: dns-failure
  namespace: chaos-testing
spec:
  action: random
  mode: all
  selector:
    namespaces:
      - app
  patterns:
    - "rds.amazonaws.com"
    - "*.rds.amazonaws.com"
  duration: "2m"

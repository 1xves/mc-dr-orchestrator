###############################################################################
# Chaos Mesh — Network Partition Experiment
# Simulates a full network cut from the primary cluster to the outside world.
# Target: health_monitor detects failure within 90s and triggers failover.
# Goal:  End-to-end RTO < 15 minutes from first failed check.
#
# Install Chaos Mesh:
#   helm repo add chaos-mesh https://charts.chaos-mesh.org
#   helm install chaos-mesh chaos-mesh/chaos-mesh -n chaos-testing --create-namespace
#
# Apply:
#   kubectl apply -f chaos-experiments/network-partition.yaml
#
# Monitor:
#   kubectl get networkchaos -n chaos-testing -w
#   kubectl get pods -n chaos-testing -w
###############################################################################
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: primary-network-partition
  namespace: chaos-testing
  labels:
    experiment: dr-rto-test
    version: "1.0"
spec:
  action: partition           # Complete bidirectional network partition
  mode: all                   # Affects ALL pods matching selector
  selector:
    namespaces:
      - app
    labelSelectors:
      role: primary-workload

  direction: both             # Block inbound AND outbound traffic

  # Duration of the chaos — long enough for the health monitor to detect
  # (3 checks × 30s = 90s minimum) plus buffer
  duration: "10m"

  # Scheduler: run at 02:00 UTC on Tuesdays (low-traffic window)
  # scheduler:
  #   cron: "0 2 * * 2"

---
###############################################################################
# Partial Network Partition — only block external API traffic
# Use this to test DB-only failover path
###############################################################################
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: partial-network-partition
  namespace: chaos-testing
  labels:
    experiment: dr-db-only-test
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - app
    labelSelectors:
      tier: api

  direction: to
  externalTargets:
    - "0.0.0.0/0"  # Block all egress (simulates API gone, DB still internal)

  duration: "8m"

---
###############################################################################
# Chaos Workflow — Orchestrates full DR test scenario with timing
###############################################################################
apiVersion: chaos-mesh.org/v1alpha1
kind: Workflow
metadata:
  name: dr-rto-test-workflow
  namespace: chaos-testing
spec:
  entry: dr-test-sequence
  templates:
    - name: dr-test-sequence
      templateType: Serial
      deadline: 30m
      children:
        - baseline-check
        - inject-partition
        - wait-for-detection
        - verify-failover
        - cleanup

    - name: baseline-check
      templateType: Task
      task:
        container:
          name: baseline
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "=== Baseline health check ==="
              curl -sf https://api.primary.com/healthz && echo "PRIMARY: OK"
              echo "Baseline timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

    - name: inject-partition
      templateType: NetworkChaos
      networkChaos:
        action: partition
        mode: all
        selector:
          namespaces: [app]
          labelSelectors:
            role: primary-workload
        direction: both
        duration: "12m"

    - name: wait-for-detection
      templateType: Suspend
      deadline: 5m   # Wait up to 5 min for monitor to detect (3×30s = 90s typical)

    - name: verify-failover
      templateType: Task
      task:
        container:
          name: verify
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "=== Verifying Azure failover ==="
              START=$(date +%s)

              # Poll until Azure endpoint is live (max 15 min)
              for i in $(seq 1 30); do
                if curl -sf https://api.primary.com/healthz --max-time 5; then
                  END=$(date +%s)
                  RTO=$((END - START))
                  echo "✅ Failover detected. RTO=${RTO}s"
                  if [ $RTO -lt 900 ]; then
                    echo "🎯 RTO TARGET MET (<15min)"
                  else
                    echo "⚠️  RTO TARGET MISSED (>15min)"
                  fi
                  exit 0
                fi
                echo "  Attempt $i: Azure not yet live, waiting 30s…"
                sleep 30
              done
              echo "❌ Failover not detected within 15 minutes"
              exit 1

    - name: cleanup
      templateType: Task
      task:
        container:
          name: cleanup
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              echo "=== Chaos experiment complete ==="
              kubectl get networkchaos -n chaos-testing
              echo "Check Grafana dashboard for RTO/RPO metrics"
